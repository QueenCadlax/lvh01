<html lang="en">
  <head>

    <meta name="language" content="English" />

    <link rel="canonical" href="https://lowveldhub.co.za" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lowveldhub.co.za" />

    <!-- Twitter / X -->

    <meta property="twitter:image" content="https://lowveldhub.co.za/og-image.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <link rel="mask-icon" href="/icon-512.svg" color="#E3B92C" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Preconnect to External Resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gold: {
                100: '#FBF5D4',
                200: '#F5E6AA',
                300: '#EFD780',
                400: '#E9C856',
                500: '#E3B92C',
                600: '#B69423',
                700: '#886F1A',
                800: '#5B4A12',
                900: '#2D2509',
              },
              luxury: {
                black: '#0a0a0a',
                charcoal: '#121212',
                glass: 'rgba(255, 255, 255, 0.05)',
                glassBorder: 'rgba(255, 255, 255, 0.1)',
              }
            },
            fontFamily: {
              serif: ['"Cormorant Garamond"', 'serif'],
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.6s ease-out forwards',
              'slide-up': 'slideUp 0.8s ease-out forwards',
              'text-reveal': 'textReveal 1s cubic-bezier(0.23, 1, 0.32, 1) forwards',
              'shimmer-metallic': 'shimmerMetallic 3s linear infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'pulse-gold': 'pulseGold 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              textReveal: {
                '0%': { opacity: '0', transform: 'translateY(100%)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              shimmerMetallic: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' },
              },
              pulseGold: {
                '0%, 100%': { 
                  borderColor: 'rgba(227, 185, 44, 0.4)',
                  boxShadow: '0 0 5px rgba(227, 185, 44, 0.2)'
                },
                '50%': { 
                  borderColor: 'rgba(227, 185, 44, 1)',
                  boxShadow: '0 0 15px rgba(227, 185, 44, 0.5)'
                },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #050505;
        color: #f8fafc;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      .glass-panel {
        background: rgba(20, 20, 20, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(227, 185, 44, 0.15);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .glass-card:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(227, 185, 44, 0.4);
        transform: translateY(-5px) scale(1.01);
        box-shadow: 0 20px 40px -15px rgba(227, 185, 44, 0.1);
      }
      .text-glow {
        text-shadow: 0 0 20px rgba(227, 185, 44, 0.3);
      }
      /* Custom utility for typography */
      .font-luxury-title {
        font-family: "Cormorant Garamond", serif;
        letter-spacing: 0.02em;
        line-height: 1.2;
      }
      .font-luxury-body {
        font-family: "Plus Jakarta Sans", sans-serif;
        letter-spacing: 0.05em;
      }
      
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #E3B92C;
      }
    </style>
